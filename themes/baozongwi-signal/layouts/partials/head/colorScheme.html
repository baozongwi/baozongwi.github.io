{{- $defaultColorScheme := default "auto" .Site.Params.colorScheme.default -}}
<script>
    (function() {
        var legacyKey = 'BaozongwiSignalColorScheme';
        var themeModeKey = 'BaozongwiSignalThemeMode';
        var themeModes = ['night', 'midnight', 'day', 'rain', 'snow'];
        var darkModes = ['night', 'midnight', 'rain'];
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches === true;
        var configuredDefault = {{ $defaultColorScheme | jsonify | safeJS }};
        var themeSource = 'default';

        function contains(list, value) {
            return list.indexOf(value) !== -1;
        }

        function getStorage(key) {
            try {
                return window.localStorage.getItem(key);
            } catch (e) {
                return null;
            }
        }

        function setStorage(key, value) {
            try {
                window.localStorage.setItem(key, value);
            } catch (e) {}
        }

        function autoTheme() {
            return prefersDark ? 'night' : 'day';
        }

        function resolveTheme(value) {
            if (contains(themeModes, value)) return value;
            if (value === 'dark') return 'night';
            if (value === 'light') return 'day';
            if (value === 'auto') return autoTheme();
            return 'day';
        }

        var themeMode = getStorage(themeModeKey);
        var shouldPersist = false;

        if (contains(themeModes, themeMode)) {
            themeSource = 'storage';
        } else {
            var legacyValue = getStorage(legacyKey);

            if (legacyValue === 'dark' || legacyValue === 'light') {
                themeMode = resolveTheme(legacyValue);
                themeSource = 'legacy';
                shouldPersist = true;
            } else if (legacyValue === 'auto') {
                themeMode = autoTheme();
                themeSource = 'auto';
            } else {
                themeMode = resolveTheme(configuredDefault);
                themeSource = configuredDefault === 'auto' ? 'auto' : 'default';
                shouldPersist = configuredDefault !== 'auto';
            }

            if (shouldPersist) {
                setStorage(themeModeKey, themeMode);
            }
        }

        document.documentElement.dataset.themeMode = themeMode;
        document.documentElement.dataset.scheme = contains(darkModes, themeMode) ? 'dark' : 'light';
        document.documentElement.dataset.themeSource = themeSource;
        document.documentElement.style.colorScheme = document.documentElement.dataset.scheme;
    })();
</script>
