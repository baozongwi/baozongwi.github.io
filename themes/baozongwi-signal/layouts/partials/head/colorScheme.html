{{- $defaultColorScheme := default "auto" .Site.Params.colorScheme.default -}}
<script>
    (function() {
        const legacyKey = 'BaozongwiSignalColorScheme';
        const themeModeKey = 'BaozongwiSignalThemeMode';
        const themeModes = new Set(['night', 'midnight', 'day', 'rain', 'snow']);
        const darkModes = new Set(['night', 'midnight', 'rain']);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
        const configuredDefault = "{{ $defaultColorScheme }}";

        const resolveDefaultTheme = (value) => {
            if (themeModes.has(value)) return value;
            if (value === 'dark') return 'night';
            if (value === 'light') return 'day';
            if (value === 'auto') return prefersDark ? 'night' : 'day';
            return 'day';
        };

        let themeMode = localStorage.getItem(themeModeKey);
        if (!themeModes.has(themeMode)) {
            const legacyValue = localStorage.getItem(legacyKey);
            if (legacyValue === 'dark' || (legacyValue === 'auto' && prefersDark)) {
                themeMode = 'night';
            } else if (legacyValue === 'light') {
                themeMode = 'day';
            } else {
                themeMode = resolveDefaultTheme(configuredDefault);
            }

            localStorage.setItem(themeModeKey, themeMode);
        }

        document.documentElement.dataset.themeMode = themeMode;
        document.documentElement.dataset.scheme = darkModes.has(themeMode) ? 'dark' : 'light';
        document.documentElement.style.colorScheme = document.documentElement.dataset.scheme;
    })();
</script>
