<div
    class="search-modal"
    id="site-search"
    data-search-modal
    data-search-index-url='{{ "index.json" | relLangURL }}'
    data-ready-text="输入标题、标签或正文关键词"
    data-empty-text="最近更新"
    data-no-results-text="没有找到匹配内容"
    data-loading-text="正在载入搜索索引…"
    data-error-text="搜索索引加载失败，请稍后再试"
    aria-hidden="true"
    hidden
>
    <div class="search-modal__backdrop" data-search-close></div>
    <section class="search-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="site-search-title">
        <header class="search-modal__header">
            <div>
                <strong id="site-search-title">{{ T "search.title" }}</strong>
                <p>支持标题、标签、分类和正文关键词检索，按 <code>Esc</code> 关闭。</p>
            </div>
            <button type="button" class="search-modal__close" aria-label="关闭搜索" data-search-close>×</button>
        </header>

        <label class="search-modal__input" for="site-search-input">
            {{ partial "helper/icon" "search" }}
            <input
                id="site-search-input"
                type="search"
                data-search-input
                placeholder='{{ T "search.placeholder" }}'
                autocomplete="off"
                spellcheck="false"
            >
        </label>

        <p class="search-modal__status" data-search-status></p>
        <div class="search-modal__results" data-search-results></div>
    </section>
</div>
