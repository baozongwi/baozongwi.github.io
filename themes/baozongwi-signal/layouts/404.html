{{ define "main" }}
    <div class="not-found-card">
        <span class="section-title">Signal Lost</span>
        <h1 class="article-title">{{ T "notFound.title" }}</h1>
        <h2 class="article-subtitle">{{ T "notFound.subtitle" }}</h2>
        <p class="not-found-text">The address may have moved, expired, or never existed on this node.</p>
        <div class="not-found-actions">
            <a class="not-found-action" href="{{ .Site.BaseURL | relLangURL }}">Back Home</a>
            {{ with .Site.GetPage "/page/archives" }}
                <a class="not-found-action secondary" href="{{ .RelPermalink }}">Browse Archives</a>
            {{ end }}
        </div>
    </div>
    {{ partialCached "footer/footer" . }}
{{ end }}
