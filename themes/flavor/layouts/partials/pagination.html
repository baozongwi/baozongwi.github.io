{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{ if $paginator.HasPrev }}
  <a href="{{ $paginator.Prev.URL }}" class="pagination__prev">← 上一页</a>
  {{ else }}
  <span class="pagination__prev disabled">← 上一页</span>
  {{ end }}

  <span class="pagination__info">{{ $paginator.PageNumber }} / {{ $paginator.TotalPages }}</span>

  {{ if $paginator.HasNext }}
  <a href="{{ $paginator.Next.URL }}" class="pagination__next">下一页 →</a>
  {{ else }}
  <span class="pagination__next disabled">下一页 →</span>
  {{ end }}
</nav>
{{ end }}
