baseurl: https://baozongwi.xyz/
locale: zh-cn
theme: "flavor"
title: baozongwi's blog
copyright: baozongwi

DefaultContentLanguage: en
hasCJKLanguage: false

services:
    googleAnalytics:
        id:
    rss:
        limit: 10

pagination:
    pagerSize: 10

outputs:
    home:
        - html
        - rss
        - json

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    description: "Currently exploring Java security and internal network penetration, with CTFs as a hobby."
    keywords:
        - Java Security
        - CTF
        - Code Audit
        - Penetration Testing
    author:
        name: baozongwi
        email: baozongwi@qq.com
        url: /about/
    avatar: img/acvtar.jpg
    favicon: logo.png
    defaultSocialImage: logo.png
    ogLocale: zh_CN
    license: "Licensed under CC BY-NC-SA 4.0"
    welcomeName: baozongwi
    welcomeTagline: "H@cking Th3 Fu1ure"

    welcome:
        enabled: true

    footer:
        since: 2024

    typewriter:
        slogans:
            - "天地不仁，以万物为刍狗"
            - "flag{ctfer_code_audit_ad_attack_cloud_sec}"

menu:
    main:
        - identifier: travel
          name: Travel
          url: /travel/
          weight: 5

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/baozongwi
          weight: 1
          params:
              icon: github

        - identifier: email
          name: Email
          url: mailto:baozongwi@qq.com
          weight: 2
          params:
              icon: mail

        - identifier: discord
          name: Discord
          url: "https://discord.com/users/1276595362970337414"
          weight: 3
          params:
              icon: discord

        - identifier: rss
          name: RSS
          url: /index.xml
          weight: 5
          params:
              icon: rss

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            linkify: true
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                        - ["{{%", "%}}"]
                    inline:
                        - - \(
                          - \)
                        - ["{{%", "%}}"]
        renderer:
            hardWraps: true
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: false
        lineNoStart: 1
        lineNos: false
        lineNumbersInTable: false
        tabWidth: 4

timeout: "10m"
