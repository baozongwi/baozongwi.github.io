baseurl: https://baozongwi.xyz/
languageCode: en-us
theme: "baozongwi-signal"
title: baozongwi's blog
copyright: baozongwi

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: en

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: false

languages:
    en:
        languageName: English
        title: baozongwi's blog
        weight: 1
        params:
            sidebar:
                subtitle: H@cking Th3 Fu1ure

services:
    googleAnalytics:
        id:
    rss:
        limit: 10

pagination:
    pagerSize: 8

outputs:
    home:
        - html
        - rss
        - json

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: logo.png
    # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `/favicon.ico` (`/` is necessary)

    footer:
        since: 2024
        customText: Currently exploring Java security and internal network penetration, with CTFs as a hobby.

    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji:
        badge: Independent Signal
        subtitle: H@cking Th3 Fu1ure
        avatar:
            enabled: true
            local: true
            src: img/acvtar.jpg

    siteDescription: Currently exploring Java security and internal network penetration, with CTFs as a hobby.

    article:
        math: false
        toc: true
        readingTime: true
        wordCount:
            other: "{{.Count}} words"
        license:
            enabled: true
            default: Licensed under CC BY-NC-SA 4.0

    widgets:
        homepage:
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 8
        page:
            - type: toc

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        toggle: true
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: false

menu:
    main:
        - identifier: travel
          name: Travel
          url: https://www.yuque.com/baozongwi/kkn04k
          weight: -50
          params:
              icon: map-pin

    social:
        - identifier: travelling
          name: Travelling
          url: https://www.travellings.cn/go.html
          weight: 6
          params:
              icon: tram-front

        - identifier: github
          name: GitHub
          url: https://github.com/baozongwi
          weight: 1
          params:
              icon: brand-github

        - identifier: email
          name: Email
          url: mailto:baozongwi@qq.com
          weight: 2
          params:
              icon: mail

        - identifier: discord
          name: discord
          url: "https://discord.com/users/1276595362970337414"
          weight: 3
          params:
              icon: discord

        - identifier: rss
          name: RSS
          url: /index.xml
          weight: 5
          params:
              icon: rss

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                        - ["{{%", "%}}"]
                    inline:
                        - - \(
                          - \)
                        - ["{{%", "%}}"]
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: false
        lineNumbersInTable: false
        tabWidth: 4

timeout: "10m"
